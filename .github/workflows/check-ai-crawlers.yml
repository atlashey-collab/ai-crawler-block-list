# Example: this repo dogfoods its own Action against aitoolsinsiderhq.com.
# Copy this file into YOUR repo's .github/workflows/ and change the url.
name: AI crawler check
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'   # every Monday 07:00 UTC
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check robots.txt for blocked AI crawlers
        uses: atlashey-collab/ai-crawler-block-list@v1
        with:
          url: https://aitoolsinsiderhq.com
          fail-on-citation-block: 'true'
